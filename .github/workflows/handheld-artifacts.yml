name: handheld-artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  desktop:
    name: Desktop protocol tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -DPLATFORM_DESKTOP=ON -DLOCALSEND_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  switch:
    name: Nintendo Switch NRO
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deko3d UI dependencies
        run: |
          dkp-pacman -Syu --noconfirm --needed switch-glm
          curl -L -o /tmp/libuam.pkg.tar.zst \
            https://github.com/xfangfang/wiliwili/releases/download/v0.1.0/libuam-f8c9eef01ffe06334d530393d636d69e2b52744b-1-any.pkg.tar.zst
          dkp-pacman -U --noconfirm /tmp/libuam.pkg.tar.zst
      - name: Configure
        working-directory: platform/switch
        run: cmake -S . -B build-ui
      - name: Build .nro
        working-directory: platform/switch
        run: cmake --build build-ui --parallel 2
      - name: Upload .nro
        uses: actions/upload-artifact@v4
        with:
          name: localsend-handheld-switch-nro
          path: platform/switch/build-ui/localsend-handheld.nro

  psv:
    name: PlayStation Vita VPK
    runs-on: ubuntu-latest
    container: vitasdk/vitasdk:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        working-directory: platform/psv
        run: cmake -S . -B build
      - name: Build .vpk
        working-directory: platform/psv
        run: cmake --build build --parallel
      - name: Upload .vpk
        uses: actions/upload-artifact@v4
        with:
          name: localsend-handheld-psv-vpk
          path: platform/psv/build/localsend-handheld.vpk
